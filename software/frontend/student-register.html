<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendify - Student Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --gradient: linear-gradient(135deg, #4f46e5 0%, #06b6d4 100%);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        h1 {
            margin-bottom: 24px;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--gradient);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
        }

        .success-message {
            display: none;
            color: #10b981;
            margin-top: 20px;
            padding: 15px;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 8px;
        }

        .error-message {
            display: none;
            color: #ef4444;
            margin-top: 20px;
            padding: 15px;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Student Registration</h1>
        <p style="color:#94a3b8; margin-bottom:30px;">Enter your details to join the enrollment queue.</p>

        <form id="regForm" onsubmit="submitForm(event)">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" required placeholder="e.g. John Doe">
            </div>
            <div class="form-group">
                <label>Roll Number</label>
                <input type="text" id="roll" required placeholder="e.g. 101">
            </div>
            <div class="form-group">
                <label>Email ID</label>
                <input type="email" id="email" required placeholder="e.g. john@example.com">
            </div>

            <button type="submit" id="btnSubmit">Join Queue</button>
        </form>

        <div id="successMsg" class="success-message">
            <h3 style="color:#10b981; margin-bottom:8px;">🎉 You're in!</h3>
            <p>Added to the enrollment queue.</p>
            <p style="font-size:0.9rem; color:#94a3b8;">Wait for the teacher to call your name.</p>
        </div>

        <div id="errorMsg" class="error-message">
            <div id="errText">Error occurred</div>
            <button onclick="resetForm()"
                style="margin-top:10px; padding:8px; font-size:0.9rem; background:rgba(255,255,255,0.1);">Try
                Again</button>
        </div>
    </div>

    <script>
        async function submitForm(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const success = document.getElementById('successMsg');
            const error = document.getElementById('errorMsg');

            btn.disabled = true;
            btn.textContent = 'Submitting...';
            error.style.display = 'none';
            success.style.display = 'none';

            const data = {
                name: document.getElementById('name').value,
                roll: document.getElementById('roll').value,
                email: document.getElementById('email').value
            };

            try {
                const res = await fetch('/api/register-queue', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await res.json();

                if (result.success) {
                    document.getElementById('regForm').style.display = 'none';
                    success.style.display = 'block';
                } else {
                    throw new Error(result.message);
                }
            } catch (err) {
                document.getElementById('errText').textContent = err.message || 'Registration failed';
                error.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Join Queue';
            }
        }

        function resetForm() {
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('btnSubmit').disabled = false;
            document.getElementById('btnSubmit').textContent = 'Join Queue';
        }
    </script>
</body>

</html>
