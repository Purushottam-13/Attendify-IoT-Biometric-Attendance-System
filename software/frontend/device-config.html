<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Configuration - Attendify</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h2 {
            color: #00d4ff;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
            font-size: 0.9rem;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 1rem;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: #00d4ff;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
        }

        .btn-danger {
            background: #dc3545;
            color: #fff;
        }

        .config-list {
            margin-top: 20px;
        }

        .config-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .config-item h3 {
            color: #00d4ff;
            font-size: 1rem;
        }

        .config-item p {
            color: #888;
            font-size: 0.85rem;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
        }

        .message.success {
            background: rgba(40, 167, 69, 0.3);
        }

        .message.error {
            background: rgba(220, 53, 69, 0.3);
        }

        .hidden {
            display: none;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: #00d4ff;
            text-decoration: none;
        }

        .back-btn:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <a href="/dashboard" class="back-btn" style="margin-bottom: 0;">← Back to Dashboard</a>
            <button onclick="logout()" class="btn btn-danger"
                style="padding: 8px 16px; font-size: 0.9rem;">Logout</button>
        </div>
        <h1>📱 Device Configuration</h1>

        <div id="message" class="message hidden"></div>

        <div class="card">
            <h2>Create/Update Device Config</h2>
            <form id="configForm">
                <div class="form-group">
                    <label>Device ID</label>
                    <input type="text" id="deviceId" placeholder="e.g., IDF-ESP32-001" required>
                </div>
                <div class="form-group">
                    <label>Admin Names (one per line)</label>
                    <textarea id="admins" placeholder="Dr. Sharma&#10;Prof. Mehta"></textarea>
                </div>
                <div class="form-group">
                    <label>Teacher Names (Simple Format or JSON)</label>
                    <p style="color: #888; font-size: 0.8rem; margin-bottom: 5px;">
                        Format: <code>Name | Subject1, Subject2</code><br>
                        Example: <code>Prof. Smith | Math, Physics</code>
                    </p>
                    <textarea id="teachers" placeholder="Prof. A | Math, Physics&#10;Prof. B | Chemistry"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">💾 Save Config</button>
            </form>
        </div>

        <div class="card">
            <h2>Existing Configurations</h2>
            <div id="configList" class="config-list">
                <p style="color:#888;">Loading...</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let authToken = localStorage.getItem('attendify_token');

        function logout() {
            localStorage.removeItem('attendify_token');
            localStorage.removeItem('attendify_email');
            window.location.href = '/login';
        }

        function showMessage(text, isError = false) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + (isError ? 'error' : 'success');
            setTimeout(() => msg.className = 'message hidden', 3000);
        }

        async function loadConfigs() {
            try {
                const res = await fetch(`${API_BASE}/api/device/configs`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const data = await res.json();

                const list = document.getElementById('configList');
                if (!data.configs || data.configs.length === 0) {
                    list.innerHTML = '<p style="color:#888;">No configurations yet</p>';
                    return;
                }

                list.innerHTML = data.configs.map(c => `
                    <div class="config-item">
                        <div>
                            <h3>${c.deviceId}</h3>
                            <p>Admins: ${c.admins?.length || 0} | Teachers: ${c.teachers?.length || 0} | v${c.version || 1}</p>
                        </div>
                        <button class="btn btn-danger" onclick="deleteConfig('${c.deviceId}')">🗑️</button>
                    </div>
                `).join('');
            } catch (err) {
                document.getElementById('configList').innerHTML = '<p style="color:#f88;">Failed to load configs</p>';
            }
        }

        document.getElementById('configForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const deviceId = document.getElementById('deviceId').value.trim();
            const adminsText = document.getElementById('admins').value.trim();
            const teachersText = document.getElementById('teachers').value.trim();

            const admins = adminsText.split('\n').map(s => s.trim()).filter(s => s);

            let teachers = [];
            try {
                // Try parsing as JSON first
                if (teachersText.trim().startsWith('[')) {
                    teachers = JSON.parse(teachersText);
                } else {
                    // Parse Simple Format: Name | Subject1, Subject2
                    const lines = teachersText.split('\n').filter(s => s.trim());
                    teachers = lines.map(line => {
                        if (line.includes('|')) {
                            const [name, subjectsStr] = line.split('|');
                            const subjects = subjectsStr.split(',').map(s => s.trim()).filter(s => s);
                            return { name: name.trim(), subjects: subjects };
                        } else {
                            return { name: line.trim(), subjects: ['All'] };
                        }
                    });
                }
            } catch (e) {
                console.error('Parse error', e);
                showMessage('Invalid format', true);
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/api/device/config`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({ deviceId, admins, teachers })
                });

                const data = await res.json();
                if (data.success) {
                    showMessage('Config saved successfully!');
                    loadConfigs();
                    document.getElementById('configForm').reset();
                } else {
                    showMessage(data.message || 'Failed to save', true);
                    if (data.message && data.message.includes('token')) {
                        // Optional: Auto-redirect to login if token invalid
                        // setTimeout(() => logout(), 2000);
                    }
                }
            } catch (err) {
                showMessage('Network error', true);
            }
        });

        async function deleteConfig(deviceId) {
            if (!confirm(`Delete config for ${deviceId}?`)) return;

            try {
                const res = await fetch(`${API_BASE}/api/device/config/${deviceId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const data = await res.json();
                if (data.success) {
                    showMessage('Config deleted');
                    loadConfigs();
                } else {
                    showMessage(data.message || 'Failed', true);
                }
            } catch (err) {
                showMessage('Network error', true);
            }
        }

        // Check auth
        if (!authToken) {
            window.location.href = '/login';
        } else {
            loadConfigs();
        }
    </script>
</body>

</html>
